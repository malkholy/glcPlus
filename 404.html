<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <script>
    // Redirect all 404s back to index.html with the path as a query param
    var path = window.location.pathname;
    var base = '/glcPlus';
    var redirect = base + '/?p=' + encodeURIComponent(path.replace(base, ''));
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
